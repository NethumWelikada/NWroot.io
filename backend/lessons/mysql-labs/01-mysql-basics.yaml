title: "MySQL: Database Fundamentals"
description: >
  Start the MySQL service, log in, and perform basic database
  and user management operations.
difficulty: intermediate
estimated_minutes: 25
exam_relevance: >
  Not a foundational certification topic, but a core skill for any sysadmin/
  DevOps role supporting real applications.
tasks:
  - id: 1
    instruction: "Start the MySQL service."
    hint: "sudo systemctl start mysql"
    validation_command: "sudo systemctl is-active mysql"
    expected_output_contains: "active"
  - id: 2
    instruction: "Log into MySQL as root and create a new database called practice_db."
    hint: "sudo mysql -e \"CREATE DATABASE practice_db;\""
    validation_command: "sudo mysql -e 'SHOW DATABASES;'"
    expected_output_contains: "practice_db"
  - id: 3
    instruction: "Create a new MySQL user called 'labuser' with a password."
    hint: "sudo mysql -e \"CREATE USER 'labuser'@'localhost' IDENTIFIED BY 'labpass123';\""
    validation_command: "sudo mysql -e \"SELECT User FROM mysql.user WHERE User='labuser';\""
    expected_output_contains: "labuser"
  - id: 4
    instruction: "Grant labuser full privileges on practice_db."
    hint: "sudo mysql -e \"GRANT ALL PRIVILEGES ON practice_db.* TO 'labuser'@'localhost'; FLUSH PRIVILEGES;\""
    validation_command: "sudo mysql -e \"SHOW GRANTS FOR 'labuser'@'localhost';\""
    expected_output_contains: "practice_db"
notes: >
  Exam tip: this exact workflow (create DB, create user, grant
  privileges) is the same pattern used to set up NWroot.io's own
  database - you're literally learning the setup you just ran.
