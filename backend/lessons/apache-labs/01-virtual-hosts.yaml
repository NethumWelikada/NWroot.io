title: "Apache: Setting Up Virtual Hosts"
description: >
  Configure Apache to serve a custom website and understand
  virtual host configuration - a real production skill.
difficulty: intermediate
estimated_minutes: 25
exam_relevance: >
  Not a foundational certification topic, but core to any web server admin
  role and frequently appears in DevOps interviews.
tasks:
  - id: 1
    instruction: "Start the Apache service if it isn't already running."
    hint: "sudo systemctl start apache2"
    validation_command: "sudo systemctl is-active apache2"
    expected_output_contains: "active"
  - id: 2
    instruction: "Confirm Apache is serving its default page using curl."
    hint: "curl localhost"
    validation_command: "curl -s localhost"
    expected_output_contains: "Apache2"
  - id: 3
    instruction: "Create a new site directory at /var/www/mysite with an index.html file containing any text."
    hint: "sudo mkdir -p /var/www/mysite && echo 'Hello NWroot' | sudo tee /var/www/mysite/index.html"
    validation_command: "test -f /var/www/mysite/index.html && echo exists"
    expected_output_contains: "exists"
  - id: 4
    instruction: "Copy the default config as a starting point for a new virtual host, then edit DocumentRoot inside it to /var/www/mysite (using nano or vim), then enable the site with a2ensite mysite.conf."
    hint: "sudo cp /etc/apache2/sites-available/000-default.conf /etc/apache2/sites-available/mysite.conf"
    validation_command: "apache2ctl -S"
    expected_output_contains: "mysite"
notes: >
  Exam tip: after enabling a new site, always run
  'sudo systemctl reload apache2' - changes won't take effect
  otherwise. This mirrors real production deployment workflow.
