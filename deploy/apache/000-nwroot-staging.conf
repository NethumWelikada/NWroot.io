# ============================================================
# NWroot.io - Apache Virtual Host (STAGING)
# Serves the built React frontend as static files, and proxies
# API + WebSocket traffic through to the Node backend running
# on localhost:3000.
#
# Listens on port 8080 as requested, on the staging LAN IP
# 192.168.1.131.
#
# Install this file to: /etc/apache2/sites-available/000-nwroot-staging.conf
# (This file lives at deploy/apache/000-nwroot-staging.conf in the repo)
# Then run:
#   sudo a2ensite 000-nwroot-staging.conf
#   sudo systemctl reload apache2
# ============================================================

# Apache needs to be told to LISTEN on port 8080 as well as its
# default port 80. This line usually goes in /etc/apache2/ports.conf
# but is noted here for clarity - the setup script handles it.
# Listen 8080

<VirtualHost 192.168.1.131:8080>

    ServerName 192.168.1.131

    # ------------------------------------------------------------
    # Serve the built React frontend (static files from `npm run build`)
    # ------------------------------------------------------------
    DocumentRoot /var/www/NWroot.io/frontend/dist

    <Directory /var/www/NWroot.io/frontend/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # React Router support: if a file doesn't exist, fall back
        # to index.html so client-side routing works on refresh
        FallbackResource /index.html
    </Directory>

    # ------------------------------------------------------------
    # Proxy normal API requests to the Node backend (port 3000)
    # ------------------------------------------------------------
    ProxyPreserveHost On
    ProxyPass /api http://localhost:3000/api
    ProxyPassReverse /api http://localhost:3000/api

    # ------------------------------------------------------------
    # Proxy WebSocket traffic (the live terminal) to the same
    # backend. mod_proxy_wstunnel handles the WebSocket upgrade.
    # ------------------------------------------------------------
    ProxyPass /ws ws://localhost:3000/ws
    ProxyPassReverse /ws ws://localhost:3000/ws

    # ------------------------------------------------------------
    # Logging - useful for debugging during staging
    # ------------------------------------------------------------
    ErrorLog ${APACHE_LOG_DIR}/nwroot-staging-error.log
    CustomLog ${APACHE_LOG_DIR}/nwroot-staging-access.log combined

</VirtualHost>
